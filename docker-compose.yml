networks:
  default:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.18.0.0/24
          gateway: 172.18.0.1

volumes:
  mosquitto-data:
  node-red-data:
  traefik-certs_data:

services:
  traefik:
    container_name: traefik
    image: traefik:latest
    restart: unless-stopped
    ports:
      # Public HTTP Port:
      - '80:80'
      # Public HTTPS Port:
      - '443:443'
      # MQTT
      - '8883:8883'
      - '8884:8884'
    environment:
      - HETZNER_API_KEY=${HETZNER_API_KEY}
      - TZ=Europe/Berlin
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./traefik/config.yml:/etc/traefik/traefik.yml:ro"
      - "./traefik/dynamic:/etc/traefik/dynamic:ro"
      - "traefik-certs_data:/etc/traefik/certs"

  authentik_proxy:
    container_name: authentik_proxy
    image: ghcr.io/goauthentik/proxy:2025.12.4
    restart: unless-stopped
    environment:
      - AUTHENTIK_HOST=https://auth.ffw-it.de
      - AUTHENTIK_INSECURE=false
    env_file:
      - authentik.env

  watchtower:
    container_name: watchtower
    image: nickfedor/watchtower
    restart: unless-stopped
    environment:
      - TZ=Europe/Berlin
      - WATCHTOWER_MONITOR_ONLY=true
      - WATCHTOWER_NOTIFICATION_URL=${WATCHTOWER_NOTIFICATION_URL}
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"

  mqtt:
    container_name: mqtt
    image: "eclipse-mosquitto"
    ports:
      - "1883:1883/tcp"
    volumes:
      - mosquitto-data:/mosquitto/data
      - ./mqtt:/mosquitto/config
    environment:
      - TZ=Europe/Berlin
    restart: unless-stopped
    labels:
      - "traefik.enable=true"

      - "traefik.tcp.routers.mqtt-private.rule=HostSNI(`*`)"
      - "traefik.tcp.routers.mqtt-private.entrypoints=mqtt-private"
      - "traefik.tcp.routers.mqtt-private.tls=true"
      - "traefik.tcp.routers.mqtt-private.service=mqtt-private"
      - "traefik.tcp.services.mqtt-private.loadbalancer.server.port=8883"

      - "traefik.tcp.routers.mqtt-private-ws.rule=HostSNI(`*`)"
      - "traefik.tcp.routers.mqtt-private-ws.entrypoints=mqtt-private-ws"
      - "traefik.tcp.routers.mqtt-private-ws.tls=true"
      - "traefik.tcp.routers.mqtt-private-ws.service=mqtt-private-ws"
      - "traefik.tcp.services.mqtt-private-ws.loadbalancer.server.port=8884"

  hass:
    container_name: hass
    build:
      context: build-hass
    volumes:
      - ./hass:/config
    environment:
      - TZ=Europe/Berlin
    depends_on:
      - mqtt
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hass.rule=Host(`hass.iot.vpn.ffw-it.de`)"
      - "traefik.http.routers.hass.entrypoints=websecure"
      - "traefik.http.routers.hass.tls=true"
      - "traefik.http.services.hass.loadbalancer.server.port=8123"

  node-red:
    container_name: node-red
    image: nodered/node-red
    extra_hosts:
      - "docker-host:host-gateway"
    volumes:
      - node-red-data:/data
    environment:
      - NODE_RED_ENABLE_PROJECTS=true
      - TZ=Europe/Berlin
    depends_on:
      - hass
    user: node-red
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.node-red.rule=Host(`flow.iot.vpn.ffw-it.de`)"
      - "traefik.http.routers.node-red.entrypoints=websecure"
      - "traefik.http.routers.node-red.middlewares=sso-auth@file"
      - "traefik.http.routers.node-red.tls=true"
      - "traefik.http.services.node-red.loadbalancer.server.port=1880"

  zigbee2mqtt:
    container_name: zigbee2mqtt
    image: koenkk/zigbee2mqtt
    volumes:
      - ./zigbee2mqtt:/app/data
    environment:
      - TZ=Europe/Berlin
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.z2m.rule=Host(`z2m.iot.vpn.ffw-it.de`)"
      - "traefik.http.routers.z2m.entrypoints=websecure"
      - "traefik.http.routers.z2m.middlewares=sso-auth@file"
      - "traefik.http.routers.z2m.tls=true"
      - "traefik.http.services.z2m.loadbalancer.server.port=8080"

  zigbee2mqtt_2:
    container_name: zigbee2mqtt_2
    image: koenkk/zigbee2mqtt
    volumes:
      - ./zigbee2mqtt_2:/app/data
    environment:
      - TZ=Europe/Berlin
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.z2m-2.rule=Host(`z2m-2.iot.vpn.ffw-it.de`)"
      - "traefik.http.routers.z2m-2.entrypoints=websecure"
      - "traefik.http.routers.z2m-2.middlewares=sso-auth@file"
      - "traefik.http.routers.z2m-2.tls=true"
      - "traefik.http.services.z2m-2.loadbalancer.server.port=8080"

  esphome:
    container_name: esphome
    image: ghcr.io/esphome/esphome
    volumes:
      - ./esphome:/config
    environment:
      - ESPHOME_DASHBOARD_USE_PING=true
      - TZ=Europe/Berlin
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.esphome.rule=Host(`esphome.iot.vpn.ffw-it.de`)"
      - "traefik.http.routers.esphome.entrypoints=websecure"
      - "traefik.http.routers.esphome.middlewares=sso-auth@file"
      - "traefik.http.routers.esphome.tls=true"
      - "traefik.http.services.esphome.loadbalancer.server.port=6052"

  vlmcsd:
    container_name: vlmcsd
    image: ghcr.io/tobsa13/vlmcsd:master
    ports:
      - "1688:1688/tcp"
    restart: unless-stopped