homeassistant:
  auth_providers:
    - type: homeassistant
    - type: trusted_networks
      trusted_networks:
        - 10.2.1.34/32
      trusted_users:
        10.2.1.34/32: ded5b5cae8b24592aa36bad472ff5b92
  name: FFW
  # Location required to calculate the time the sun rises and sets
  latitude: 49.252909
  longitude: 10.2431055
  country: DE
  elevation: 460
    # C for Celcius, F for Fahrenheit
  temperature_unit: C
  # Pick yours from here: http://en.wikipedia.org/wiki/List_of_tz_database_time_zones
  time_zone: Europe/Berlin
  unit_system: metric
  customize_glob:
    "cover.gate":
      assumed_state: true

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.18.0.0/24

recorder:
  purge_keep_days: 31
  exclude:
    domains:
      - automation
      - update
    entity_globs:
      - sensor.sun*
      - weather.*
      - sensor.*_voltage
      - sensor.*_power
      - sensor.relay_*_power_*
      - sensor.*_temperature
      - sensor.lenovo_tab_m10_3rd_*
      - sensor.date_*
      - sensor.*_current
      - sensor.*_wifi_signal
      - sensor.*_wifi_signal_percentage
    entities:
      - sensor.date
      - sensor.last_boot
      - sun.sun
      - image.lenovo_tab_m10_3rd_gen_bildschirmfoto
      - camera.lenovo_tab_m10_3rd_gen
      - camera.hmi3
      - sensor.time
      - sensor.time_date

homeassistant_alerts:
history:
logbook:
my:
sun:
timer:
media_source:
mobile_app:

sensor:
  - platform: time_date
    display_options:
      - 'time'
      - 'date'
      - 'date_time'
      - 'date_time_utc'
      - 'date_time_iso'
      - 'time_date'

mqtt:
  cover: !include gates.yaml
  switch: !include switches.yaml
  sensor: !include sensors.yaml

group: !include groups.yaml
automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

climate: !include climates.yaml

logger:
  default: info
  logs:
    pyfritzhome.fritzhome: warning
  filters:
    homeassistant.components.websocket_api.http.connection:
      - "Error handling message: Unknown error" # Bug in browser_mod

browser_mod:

openid:
  client_id: "hc3h5kBPmsxkA24CPV27xjzm7kHEO7jLbU7xG1EX"
  client_secret: !secret openid_secret
  configure_url: "https://auth.ffw-it.de/application/o/home-assistant-iot/.well-known/openid-configuration"
  username_field: "hass_user"
  scope: "openid profile email hass"
  block_login: true
  trusted_ips: # List of CIDR blocks that are not affected by block_login
    - "172.18.0.0/24"
    - "10.2.1.0/24"
  openid_text: "Login with auth.ffw-it.de"
  create_user: true
